{% extends "base.html" %}
{% block content %}

<h2>Results</h2>

{% if results %}
<table border="1">
<tr><th>Quiz ID</th><th>Score</th></tr>
{% for r in results %}
<tr>
<td>{{ r.quiz_id }}</td>
<td>{{ r.score }}</td>
</tr>
{% endfor %}
</table>
{% else %}
<p>No Results</p>
{% endif %}

{% endblock %}
